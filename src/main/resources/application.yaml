spring:
  datasource:
    # We use ${VAR_NAME:default_value} so it works even if variables aren't set
    url: ${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=InventoryDB;encrypt=true;trustServerCertificate=true;instanceName=SQLEXPRESS}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect